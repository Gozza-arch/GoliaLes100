<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100 Films Cultes — Lolia éduque Gozza</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{
  --ink:#07070f;--card:#13131c;--card2:#1a1a27;
  --gold:#e8b84b;--gold2:#c9922a;
  --green:#2dc653;--red:#e63946;--amber:#f4a426;
  --muted:#8a8998;--paper:#f0ece2;
  --border:rgba(232,184,75,.15);
  --border2:rgba(255,255,255,.07);
  --r:10px;--rl:14px;
  --ff-h:'Bebas Neue',sans-serif;
  --ff-b:'DM Sans',sans-serif;
  --ff-s:'Nunito',sans-serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:var(--ff-b);background:var(--ink);color:var(--paper);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");opacity:.5;}
.wrap{max-width:1600px;margin:0 auto;padding:0 28px 100px;position:relative;z-index:1;}

/* HEADER */
.site-header{display:flex;flex-direction:column;align-items:center;padding:52px 0 44px;position:relative;}
.filmstrip{position:absolute;top:0;left:0;right:0;height:20px;overflow:hidden;display:flex;align-items:center;}
.filmstrip::after{content:'◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉  ◉';
  color:rgba(232,184,75,.35);font-size:7px;letter-spacing:8px;white-space:nowrap;animation:filmRoll 22s linear infinite;}
@keyframes filmRoll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.header-eyebrow{font-size:.68rem;font-weight:700;letter-spacing:5px;text-transform:uppercase;color:var(--gold);margin-top:20px;margin-bottom:10px;}
.header-title{font-family:var(--ff-h);font-size:clamp(3.5rem,9vw,8.5rem);line-height:.88;text-align:center;color:var(--paper);-webkit-text-stroke:1px rgba(232,184,75,.22);}
.header-title em{color:var(--gold);display:block;font-style:normal;font-size:.5em;letter-spacing:10px;-webkit-text-stroke:0;}
.header-sub{font-family:var(--ff-s);font-style:italic;color:var(--muted);font-size:1.08rem;margin-top:13px;}
.header-line{width:100px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:18px auto 0;}

/* STATS */
.stats{display:flex;gap:10px;margin:32px 0 22px;flex-wrap:wrap;justify-content:center;}
.stat-card{background:var(--card);border:1px solid var(--border2);border-radius:var(--r);padding:16px 24px;text-align:center;flex:1;min-width:110px;max-width:160px;transition:transform .2s,border-color .2s;}
.stat-card:hover{transform:translateY(-3px);border-color:var(--gold);}
.stat-num{display:block;font-family:var(--ff-h);font-size:2.6rem;color:var(--gold);line-height:1;}
.stat-lbl{font-size:.65rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:4px;display:block;font-weight:600;}

/* TOOLBAR */
.toolbar{background:var(--card);border:1px solid var(--border2);border-radius:var(--r);padding:14px 18px;margin-bottom:12px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
.search-w{position:relative;flex:1;min-width:220px;}
.search-w i{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.85rem;pointer-events:none;}
.search-w input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:8px;padding:10px 14px 10px 36px;color:var(--paper);font-family:var(--ff-b);font-size:.9rem;outline:none;transition:border-color .2s;}
.search-w input::placeholder{color:var(--muted);}
.search-w input:focus{border-color:var(--gold);}
.view-toggle{display:flex;gap:3px;background:rgba(255,255,255,.05);border-radius:8px;padding:3px;}
.vbtn{background:none;border:none;color:var(--muted);cursor:pointer;padding:7px 14px;border-radius:6px;font-size:.82rem;transition:all .15s;display:flex;align-items:center;gap:6px;font-family:var(--ff-b);font-weight:600;}
.vbtn.active{background:var(--gold);color:var(--ink);}
.btn{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--ink);border:none;padding:10px 18px;border-radius:8px;cursor:pointer;font-family:var(--ff-b);font-weight:700;font-size:.85rem;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:7px;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(232,184,75,.35);}
.btn-ghost{background:rgba(255,255,255,.07);color:var(--paper);border:1px solid rgba(255,255,255,.1);box-shadow:none;}
.btn-ghost:hover{background:rgba(255,255,255,.12);box-shadow:none;}
.btn-danger{background:linear-gradient(135deg,var(--red),#b52525);color:#fff;}

/* FILTERS */
.filters-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px;align-items:center;}
.filters-bar select{background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--paper);font-family:var(--ff-b);font-size:.82rem;padding:9px 12px;cursor:pointer;outline:none;transition:border-color .2s;}
.filters-bar select:focus{border-color:var(--gold);}
.filters-bar select option{background:var(--card);}
.f-label{font-size:.68rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted);}

/* SUGGESTION OVERLAY — SPECTACULAIRE */
#suggestion-overlay{
  display:none;position:fixed;inset:0;z-index:800;
  background:rgba(0,0,0,.85);backdrop-filter:blur(20px);
  align-items:center;justify-content:center;padding:20px;
}
#suggestion-overlay.show{display:flex;animation:sogFadeIn .3s ease;}
@keyframes sogFadeIn{from{opacity:0}to{opacity:1}}

.sog-box{
  position:relative;max-width:480px;width:100%;
  animation:sogPop .4s cubic-bezier(.34,1.3,.64,1);
  text-align:center;
}
@keyframes sogPop{from{opacity:0;transform:scale(.85) translateY(30px)}to{opacity:1;transform:scale(1) translateY(0)}}

.sog-label{
  font-size:.68rem;font-weight:800;letter-spacing:4px;text-transform:uppercase;
  color:var(--gold);margin-bottom:18px;display:flex;align-items:center;justify-content:center;gap:10px;
}
.sog-label::before,.sog-label::after{content:'';flex:1;max-width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--gold));}
.sog-label::after{transform:scaleX(-1);}

.sog-poster-wrap{
  position:relative;width:200px;margin:0 auto 22px;
  border-radius:16px;overflow:hidden;
  box-shadow:0 30px 80px rgba(0,0,0,.9),0 0 0 2px rgba(232,184,75,.4);
  aspect-ratio:2/3;background:var(--card);
  cursor:pointer;transition:transform .2s;
}
.sog-poster-wrap:hover{transform:scale(1.03);}
.sog-poster-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.sog-poster-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:4rem;opacity:.3;background:var(--card2);}

.sog-glow{
  position:absolute;inset:0;border-radius:16px;pointer-events:none;
  background:linear-gradient(to top,rgba(232,184,75,.25) 0%,transparent 60%);
}

.sog-title{
  font-family:var(--ff-h);font-size:clamp(1.6rem,5vw,2.4rem);
  color:#fff;line-height:1.1;letter-spacing:.5px;
  cursor:pointer;display:inline-block;
  transition:color .2s;margin-bottom:8px;
}
.sog-title:hover{color:var(--gold);}

.sog-meta{
  font-size:.8rem;color:var(--muted);margin-bottom:6px;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.sog-genre{
  display:inline-block;background:rgba(232,184,75,.12);color:var(--gold);
  border:1px solid rgba(232,184,75,.3);border-radius:20px;
  padding:4px 14px;font-size:.7rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  margin-bottom:24px;
}

.sog-actions{display:flex;gap:10px;justify-content:center;}
.sog-btn-open{
  background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--ink);
  border:none;padding:12px 28px;border-radius:10px;cursor:pointer;
  font-family:var(--ff-b);font-weight:800;font-size:.88rem;
  display:flex;align-items:center;gap:8px;
  transition:all .2s;
}
.sog-btn-open:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(232,184,75,.45);}
.sog-btn-reroll{
  background:rgba(255,255,255,.08);color:var(--paper);
  border:1px solid rgba(255,255,255,.15);padding:12px 20px;border-radius:10px;cursor:pointer;
  font-family:var(--ff-b);font-weight:700;font-size:.88rem;
  display:flex;align-items:center;gap:8px;
  transition:all .2s;
}
.sog-btn-reroll:hover{background:rgba(255,255,255,.14);}
.sog-close{
  position:absolute;top:-14px;right:-14px;
  background:rgba(30,30,45,.9);border:1px solid rgba(255,255,255,.15);
  border-radius:50%;color:#fff;width:36px;height:36px;
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;cursor:pointer;transition:all .2s;
}
.sog-close:hover{background:var(--red);border-color:var(--red);transform:rotate(90deg);}
.results-info{font-size:.74rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:14px;}

/* GRID — GRANDES AFFICHES */
#grid-view{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:22px;}

.film-card{position:relative;border-radius:var(--rl);cursor:pointer;transition:transform .28s cubic-bezier(.34,1.4,.64,1);}
.film-card:hover{transform:translateY(-8px) scale(1.02);z-index:5;}
.film-card:hover .poster-wrap{box-shadow:0 24px 50px rgba(0,0,0,.85),0 0 0 2px var(--gold);}

.poster-wrap{position:relative;border-radius:var(--rl);overflow:hidden;aspect-ratio:2/3;background:var(--card);border:1px solid var(--border2);box-shadow:0 8px 24px rgba(0,0,0,.55);transition:box-shadow .28s;}
.poster-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s ease;}
.film-card:hover .poster-wrap img{transform:scale(1.04);}

.poster-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:20px;text-align:center;background:linear-gradient(160deg,#1e1e2e,#111118);}
.ph-icon{font-size:3.2rem;opacity:.3;}
.ph-title{font-family:var(--ff-h);font-size:1rem;letter-spacing:1px;color:var(--paper);opacity:.6;line-height:1.3;}
.ph-year{font-size:.78rem;color:var(--gold);opacity:.6;}
.poster-loading{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--card);}
.spinner{width:24px;height:24px;border:2px solid rgba(232,184,75,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* Hint overlay "Voir détails" */
.poster-hint{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.8) 0%,rgba(0,0,0,0) 50%);display:flex;align-items:flex-end;justify-content:center;padding-bottom:16px;opacity:0;transition:opacity .25s;border-radius:var(--rl);pointer-events:none;}
.film-card:hover .poster-hint{opacity:1;}
.poster-hint span{background:rgba(232,184,75,.15);backdrop-filter:blur(6px);border:1px solid rgba(232,184,75,.5);border-radius:20px;padding:7px 18px;font-size:.72rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:7px;}

/* Rating pills */
.card-ratings{position:absolute;top:10px;left:10px;display:flex;flex-direction:column;gap:5px;z-index:4;}
.rp{background:rgba(0,0,0,.82);backdrop-filter:blur(4px);border-radius:20px;padding:3px 8px;font-size:.64rem;font-weight:700;color:#fff;display:flex;align-items:center;gap:3px;border:1px solid rgba(255,255,255,.08);}
.rp .rpn{color:var(--muted);font-size:.57rem;text-transform:uppercase;letter-spacing:.4px;}
.rp .rps{color:#f59e0b;letter-spacing:-1px;}

/* Delete */
.card-del{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);border:none;border-radius:7px;color:#aaa;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:.75rem;cursor:pointer;opacity:0;transition:opacity .18s,background .18s;z-index:4;}
.film-card:hover .card-del{opacity:1;}
.card-del:hover{background:var(--red);color:#fff;}

/* STATUS BADGES — PILLS SUR L'AFFICHE */
.card-ratings{position:absolute;top:10px;left:10px;display:flex;flex-direction:column;gap:5px;z-index:4;}

/* Nouveau design : badge compact avec initiale + icône colorée */
.csb-btn{
  display:flex;align-items:center;gap:5px;
  padding:5px 9px 5px 7px;
  border-radius:20px;border:1.5px solid transparent;
  cursor:pointer;font-family:var(--ff-b);font-weight:700;
  font-size:.68rem;letter-spacing:.3px;
  transition:all .18s;
  backdrop-filter:blur(8px);
  text-transform:uppercase;
  line-height:1;
}
.csb-btn .csb-who{
  width:16px;height:16px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.6rem;font-weight:800;flex-shrink:0;
}
.csb-btn .csb-icon{font-size:.8rem;line-height:1;}
.csb-btn .csb-label{font-size:.65rem;font-weight:700;}

/* Vu — vert */
.csb-btn.vu{
  background:rgba(30,160,70,.85);color:#fff;
  border-color:rgba(60,210,100,.4);
  box-shadow:0 2px 10px rgba(30,160,70,.4);
}
.csb-btn.vu:hover{background:rgba(30,180,75,1);box-shadow:0 4px 16px rgba(30,160,70,.6);transform:translateX(2px);}
.csb-btn.vu .csb-who{background:rgba(255,255,255,.2);color:#fff;}

/* Pas vu — gris discret */
.csb-btn.pas-vu{
  background:rgba(20,20,35,.78);color:rgba(255,255,255,.55);
  border-color:rgba(255,255,255,.12);
}
.csb-btn.pas-vu:hover{background:rgba(40,40,60,.9);color:rgba(255,255,255,.8);border-color:rgba(255,255,255,.25);}
.csb-btn.pas-vu .csb-who{background:rgba(255,255,255,.1);color:rgba(255,255,255,.6);}

/* À revoir — ambre */
.csb-btn.a-revoir{
  background:rgba(200,130,20,.85);color:#fff;
  border-color:rgba(244,164,38,.4);
  box-shadow:0 2px 10px rgba(200,130,20,.4);
}
.csb-btn.a-revoir:hover{background:rgba(220,145,25,1);box-shadow:0 4px 16px rgba(200,130,20,.5);transform:translateX(2px);}
.csb-btn.a-revoir .csb-who{background:rgba(255,255,255,.2);color:#fff;}

.card-foot{padding:8px 4px 2px;cursor:pointer;}
.cf-title{font-size:.88rem;font-weight:700;color:var(--paper);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;letter-spacing:.01em;}
.cf-meta{font-size:.7rem;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:5px;}
.cf-meta-dot{width:3px;height:3px;border-radius:50%;background:var(--muted);opacity:.5;display:inline-block;}

/* FILM DETAIL POP-UP */
#fdm{display:none;position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.88);backdrop-filter:blur(16px);align-items:center;justify-content:center;padding:16px;}
#fdm.show{display:flex;animation:fdmFadeIn .2s ease;}
@keyframes fdmFadeIn{from{opacity:0}to{opacity:1}}

.fdm-box{background:var(--card);border:1px solid var(--border);border-radius:24px;width:100%;max-width:940px;max-height:95vh;overflow:hidden;position:relative;display:flex;flex-direction:column;animation:fdmPop .32s cubic-bezier(.34,1.3,.64,1);box-shadow:0 50px 120px rgba(0,0,0,.9),0 0 0 1px rgba(232,184,75,.15);}
@keyframes fdmPop{from{opacity:0;transform:scale(.9) translateY(24px)}to{opacity:1;transform:scale(1) translateY(0)}}

.fdm-hero{position:relative;min-height:300px;flex-shrink:0;overflow:hidden;}
.fdm-bg{position:absolute;inset:-10%;width:120%;height:120%;object-fit:cover;filter:blur(22px) brightness(.3) saturate(1.3);transform:scale(1.05);pointer-events:none;}
.fdm-bg-ph{position:absolute;inset:0;background:linear-gradient(135deg,#1a1a2e 0%,#0d0d1a 100%);}
.fdm-hero-inner{position:relative;z-index:2;display:flex;gap:30px;padding:36px 36px 28px;align-items:flex-end;}
.fdm-poster{width:145px;flex-shrink:0;border-radius:14px;overflow:hidden;box-shadow:0 16px 50px rgba(0,0,0,.75),0 0 0 2.5px rgba(232,184,75,.35);aspect-ratio:2/3;}
.fdm-poster img{width:100%;height:100%;object-fit:cover;display:block;}
.fdm-poster-ph{width:100%;height:100%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:3.5rem;opacity:.35;}
.fdm-info{flex:1;min-width:0;}
.fdm-tag{display:inline-block;background:rgba(232,184,75,.15);color:var(--gold);border:1px solid rgba(232,184,75,.4);border-radius:20px;padding:4px 14px;font-size:.7rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;}
.fdm-title{font-family:var(--ff-h);font-size:clamp(1.8rem,5vw,2.9rem);color:#fff;line-height:1;letter-spacing:.5px;text-shadow:0 3px 20px rgba(0,0,0,.8);}
.fdm-meta-row{display:flex;gap:18px;flex-wrap:wrap;margin-top:10px;}
.fdm-meta-item{font-size:.82rem;color:rgba(255,255,255,.5);display:flex;align-items:center;gap:6px;}
.fdm-meta-item i{color:var(--gold);font-size:.75rem;}

.fdm-body{flex:1;overflow-y:auto;padding:28px 36px 36px;scrollbar-width:thin;scrollbar-color:rgba(232,184,75,.25) transparent;}
.fdm-body::-webkit-scrollbar{width:5px;}
.fdm-body::-webkit-scrollbar-thumb{background:rgba(232,184,75,.25);border-radius:4px;}

.fdm-section{margin-bottom:28px;}
.fdm-section-title{font-family:var(--ff-h);font-size:.95rem;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:12px;}
.fdm-section-title::after{content:'';flex:1;height:1px;background:var(--border);}

.fdm-synopsis{font-family:var(--ff-s);font-style:normal;font-size:1rem;font-weight:400;color:rgba(240,236,226,.88);line-height:1.78;padding:18px 22px;background:rgba(255,255,255,.04);border-left:3px solid var(--gold);border-radius:0 10px 10px 0;letter-spacing:.01em;}
.fdm-synopsis.empty{font-style:normal;font-size:.9rem;color:var(--muted);}

/* Person blocks in modal */
.fdm-persons{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.fdm-pb{background:var(--card2);border:1px solid var(--border);border-radius:16px;padding:22px 20px;}
.fdm-pname{font-family:var(--ff-h);font-size:1.6rem;letter-spacing:1px;color:var(--paper);margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.fdm-pname em{font-style:normal;font-size:.55em;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}

/* Big status buttons in modal */
.fdm-status-row{display:flex;gap:8px;margin-bottom:18px;}
.fdm-sbtn{flex:1;padding:13px 6px;border-radius:12px;border:2px solid transparent;cursor:pointer;font-family:var(--ff-b);font-weight:800;font-size:.78rem;letter-spacing:.3px;text-transform:uppercase;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:6px;}
.fdm-sbtn .s-ico{font-size:1.35rem;}
.fdm-sbtn .s-lbl{font-size:.75rem;}
.fdm-sbtn.vu{background:rgba(45,198,83,.1);color:#3de065;border-color:rgba(45,198,83,.3);}
.fdm-sbtn.vu.sel,.fdm-sbtn.vu:hover{background:rgba(45,198,83,.9);color:#fff;border-color:transparent;box-shadow:0 6px 22px rgba(45,198,83,.4);}
.fdm-sbtn.pas-vu{background:rgba(230,57,70,.1);color:#f06070;border-color:rgba(230,57,70,.3);}
.fdm-sbtn.pas-vu.sel,.fdm-sbtn.pas-vu:hover{background:rgba(230,57,70,.9);color:#fff;border-color:transparent;box-shadow:0 6px 22px rgba(230,57,70,.4);}

  <script>async function cleanDuplicates() {
  const snapshot = await getDocs(col);
  const allFilms = snapshot.docs.map(d => d.data());
  const uniqueTitles = new Map();

  allFilms.forEach(film => {
    if (!uniqueTitles.has(film.title)) {
      uniqueTitles.set(film.title, film);
    }
  });

  // Supprimer les doublons
  for (const [title, film] of uniqueTitles) {
    const querySnapshot = await getDocs(query(col, where("title", "==", title)));
    if (querySnapshot.docs.length > 1) {
      console.log(`Suppression des doublons pour ${title}`);
      querySnapshot.docs.forEach(doc => {
        if (doc.id !== film.id.toString()) {
          deleteDoc(doc.ref);
        }
      });
    }
  }

  console.log("Nettoyage terminé");
}

// Exécuter le nettoyage

<script>
const TK='2dca580c2a14b55200e784d157207b4d';
const TW='https://image.tmdb.org/t/p/w342';
const TBG='https://image.tmdb.org/t/p/w780';
const pC={},sC={},bC={},tC={};

// Clé de cache stable basée sur titre+année (immunise contre les IDs instables de Firestore)
function cacheKey(f){ return `${f.title}__${f.year}`; }

// File de fetch pour éviter de surcharger l'API
const fetchQueue = [];
let fetchRunning = 0;
const FETCH_CONCURRENCY = 4;

function enqueueFetch(f) {
  const k = cacheKey(f);
  if (pC[k] !== undefined) return;
  pC[k] = null; sC[k] = ''; bC[k] = null;
  fetchQueue.push(f);
  drainQueue();
}

function drainQueue() {
  while (fetchRunning < FETCH_CONCURRENCY && fetchQueue.length > 0) {
    const f = fetchQueue.shift();
    fetchRunning++;
    fetchTMDB(f).finally(() => { fetchRunning--; drainQueue(); });
  }
}

async function fetchTMDB(f) {
  const k = cacheKey(f);
  const BASE_SEARCH = 'https://api.themoviedb.org/3/search/movie';
  const BASE_MOVIE  = 'https://api.themoviedb.org/3/movie';

  try {
    let tmdbId = f.tmdbId || null;

    // ── CAS 1 : on connaît déjà l'ID TMDB → fetch direct, zéro ambiguïté ──
    if (tmdbId) {
      const r = await fetch(`${BASE_MOVIE}/${tmdbId}?api_key=${TK}&language=fr-FR`);
      if (r.ok) {
        const d = await r.json();
        pC[k] = d.poster_path  ? TW  + d.poster_path  : null;
        bC[k] = d.backdrop_path ? TBG + d.backdrop_path : null;
        sC[k] = d.overview || '';
        // Synopsis vide en FR → re-fetch en EN
        if (!sC[k]) {
          const re = await fetch(`${BASE_MOVIE}/${tmdbId}?api_key=${TK}&language=en-US`);
          if (re.ok) { const de = await re.json(); sC[k] = de.overview || ''; }
        }
        updateCard(f.id);
        return;
      }
    }

    // ── CAS 2 : pas d'ID connu → recherche par titre, puis on stocke l'ID ──
    const trySearch = async (title, lang, withYear) => {
      const q = encodeURIComponent(title);
      let url = `${BASE_SEARCH}?api_key=${TK}&query=${q}&language=${lang}&include_adult=false`;
      if (withYear) url += `&year=${f.year}`;
      const r = await fetch(url);
      if (!r.ok) return null;
      const d = await r.json();
      return (d.results || []).find(x => x.poster_path) || null;
    };

    let hit = await trySearch(f.title, 'fr-FR', true)
           || await trySearch(f.title, 'fr-FR', false)
           || await trySearch(f.title, 'en-US', true)
           || await trySearch(f.title, 'en-US', false);

    // Fallback : recherche sans filtre pour récupérer l'original_title
    if (!hit) {
      const r = await fetch(`${BASE_SEARCH}?api_key=${TK}&query=${encodeURIComponent(f.title)}&include_adult=false`);
      if (r.ok) {
        const d = await r.json();
        const candidate = (d.results || [])[0];
        if (candidate?.original_title && candidate.original_title !== f.title) {
          hit = await trySearch(candidate.original_title, 'fr-FR', false)
             || await trySearch(candidate.original_title, 'en-US', false);
          if (hit) tC[k] = candidate.original_title;
        }
      }
    }

    if (hit) {
      tmdbId = hit.id;
      pC[k] = TW  + hit.poster_path;
      bC[k] = hit.backdrop_path ? TBG + hit.backdrop_path : null;
      sC[k] = hit.overview || '';

      // Synopsis vide en FR → re-fetch détail en EN
      if (!sC[k]) {
        const re = await fetch(`${BASE_MOVIE}/${tmdbId}?api_key=${TK}&language=en-US`);
        if (re.ok) { const de = await re.json(); sC[k] = de.overview || ''; }
      }

      // ── Sauvegarde l'ID TMDB dans Firebase pour les prochains chargements ──
      if (tmdbId && window.saveFilmToDb) {
        const film = films.find(x => x.id == f.id);
        if (film && !film.tmdbId) {
          film.tmdbId = tmdbId;
          window.saveFilmToDb(film);
        }
      }
    }

    updateCard(f.id);

  } catch(e) {
    // Retry silencieux après 3s
    setTimeout(async () => {
      try {
        const r = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TK}&query=${encodeURIComponent(f.title)}&language=fr-FR`);
        const d = await r.json();
        const hit = (d.results||[]).find(x=>x.poster_path);
        if (hit) { const k2=cacheKey(f); pC[k2]=TW+hit.poster_path; sC[k2]=hit.overview||''; if(hit.backdrop_path) bC[k2]=TBG+hit.backdrop_path; }
        updateCard(f.id);
      } catch(e2) {}
    }, 3000);
  }
}

let sortKey=null,sortDir='asc',filmToDelete=null,nextId=101;
const FLAGS={us:'🇺🇸',fr:'🇫🇷',jp:'🇯🇵',gb:'🇬🇧',kr:'🇰🇷',ru:'🇷🇺',se:'🇸🇪',it:'🇮🇹',de:'🇩🇪',au:'🇦🇺',br:'🇧🇷'};
const flags=c=>c.split('-').map(x=>FLAGS[x]||x.toUpperCase()).join(' ');
const SL={'vu':'Vu','a-revoir':'À revoir','pas-vu':'Pas vu'};
const SC={'vu':'watched','a-revoir':'rewatch','pas-vu':'not-watched'};
const ico={'vu':'✅','a-revoir':'🔄','pas-vu':'✖'};

function toggleStatus(id,person,e){
  if(e)e.stopPropagation();
  const f=films.find(x=>x.id===id);if(!f)return;
  const k=person==='Gozza'?'GozzaStatus':'LoliaStatus';
  const rk=person==='Gozza'?'ratingGozza':'ratingLolia';
  if(f[k]==='pas-vu'){f[k]='vu';if(!f[rk])f[rk]=1;}
  else if(f[k]==='vu'){f[k]='a-revoir';}
  else{f[k]='pas-vu';f[rk]=0;}
  save();render();updateStats();
}

function setRating(id,person,val,e){
  if(e)e.stopPropagation();
  const f=films.find(x=>x.id===id);if(!f)return;
  const k=person==='Gozza'?'ratingGozza':'ratingLolia';
  f[k]=(f[k]===val)?0:val;
  save();render();
}
function starsHTML(id,person,rating,cls){
  return[1,2,3,4,5].map(i=>`<span class="${cls} ${i<=rating?'on':''}"
    onclick="setRating(${id},'${person}',${i},event)"
    onmouseover="pvS(this,${i})" onmouseout="rsS(this,${rating})">★</span>`).join('');
}
function pvS(el,n){el.parentElement.querySelectorAll('span').forEach((s,i)=>s.style.color=i<n?'#f59e0b':'');}
function rsS(el,r){el.parentElement.querySelectorAll('span').forEach((s,i)=>s.style.color=i<r?'#f59e0b':'');}

function updateCard(id){
  const el=document.querySelector(`[data-id="${id}"]`);if(!el)return;
  const pw=el.querySelector('.poster-wrap');if(!pw)return;
  const f=films.find(x=>x.id==id);if(!f)return;
  const k=cacheKey(f);
  const displayTitle = tC[k] || f.title;
  const hint=`<div class="poster-hint"><span><i class="fa fa-circle-play"></i> Voir les détails</span></div>`;
  if(pC[k]){pw.innerHTML=`<img src="${pC[k]}" alt="${displayTitle}" loading="lazy">${hint}`;}
  else{pw.innerHTML=`<div class="poster-placeholder"><div class="ph-icon">🎬</div><div class="ph-title">${displayTitle}</div><div class="ph-year">${f.year}</div></div>${hint}`;}
}

/* DETAIL MODAL */
function openDetail(id){
  const f=films.find(x=>x.id==id);if(!f)return;
  const k=cacheKey(f);
  // BG
  const bgEl=document.getElementById('fdm-bg');
  const bgSrc=bC[k]||pC[k];
  if(bgSrc){bgEl.outerHTML=`<img id="fdm-bg" class="fdm-bg" src="${bgSrc}" alt="">`;}
  else{bgEl.outerHTML=`<div id="fdm-bg" class="fdm-bg-ph"></div>`;}
  // Poster
  const pEl=document.getElementById('fdm-poster');
  pEl.innerHTML=pC[k]?`<img src="${pC[k]}" alt="">`:`<div class="fdm-poster-ph">🎬</div>`;
  // Info
  document.getElementById('fdm-tag').textContent=f.genre||'';
  document.getElementById('fdm-title').textContent=f.title;
  document.getElementById('fdm-meta').innerHTML=`
    <div class="fdm-meta-item"><i class="fa fa-calendar"></i>${f.year}</div>
    <div class="fdm-meta-item"><i class="fa fa-flag"></i>${flags(f.country)}</div>
    <div class="fdm-meta-item"><i class="fa fa-film"></i>${f.genre||'—'}</div>`;
  // Synopsis
  const syn=document.getElementById('fdm-synopsis');
  const txt=sC[k];
  if(txt){syn.textContent=txt;syn.className='fdm-synopsis';}
  else{syn.textContent='Aucun synopsis disponible pour ce film.';syn.className='fdm-synopsis empty';}
  // Persons
  renderDetailPersons(f);
  document.getElementById('fdm').classList.add('show');
  document.body.style.overflow='hidden';
}

function renderDetailPersons(f){
  document.getElementById('fdm-persons').innerHTML=['Gozza','Lolia'].map(p=>{
    const sk=p==='Gozza'?'GozzaStatus':'LoliaStatus';
    const rk=p==='Gozza'?'ratingGozza':'ratingLolia';
    const st=f[sk],rt=f[rk];
    const sb=s=>`<button class="fdm-sbtn ${s}${st===s?' sel':''}" onclick="setStatusDetail(${f.id},'${p}','${s}')"><span class="s-ico">${ico[s]}</span><span class="s-lbl">${SL[s]}</span></button>`;
    return`<div class="fdm-pb">
      <div class="fdm-pname">${p} <em>Statut &amp; note</em></div>
      <div class="fdm-status-row">${sb('vu')}${sb('a-revoir')}${sb('pas-vu')}</div>
      <div class="fdm-stars-lbl">Ma note</div>
      <div class="fdm-stars">${starsHTML(f.id,p,rt,'fds')}</div>
    </div>`;
  }).join('');
}

function setStatusDetail(id,person,status){
  const f=films.find(x=>x.id===id);if(!f)return;
  const k=person==='Gozza'?'GozzaStatus':'LoliaStatus';
  const rk=person==='Gozza'?'ratingGozza':'ratingLolia';
  f[k]=status;
  if(status==='pas-vu')f[rk]=0;
  else if(status==='vu'&&!f[rk])f[rk]=1;
  save();render();updateStats();renderDetailPersons(f);
}

document.getElementById('fdm-close').addEventListener('click',()=>{document.getElementById('fdm').classList.remove('show');document.body.style.overflow='';});
document.getElementById('fdm').addEventListener('click',e=>{if(e.target===document.getElementById('fdm')){document.getElementById('fdm').classList.remove('show');document.body.style.overflow='';}});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){document.getElementById('fdm').classList.remove('show');document.body.style.overflow='';}});

/* RENDER */
function getFiltered() {
  const search = document.getElementById('search').value.toLowerCase();
  const country = document.getElementById('filter-country').value;
  const genre = document.getElementById('filter-genre').value;
  const decade = document.getElementById('filter-decade').value;
  const status = document.getElementById('filter-status').value;

  return films.filter(f => {
    // Filtre de recherche
    if (search && !(
      f.title.toLowerCase().includes(search) ||
      (f.genre && f.genre.toLowerCase().includes(search))
    )) return false;

    // Filtre par pays
    if (country && f.country !== country) return false;

    // Filtre par genre
    if (genre && !(f.genre && f.genre.toLowerCase().includes(genre.toLowerCase()))) return false;

    // Filtre par décennie
    if (decade) {
      const start = parseInt(decade);
      const end = start + 9;
      if (f.year < start || f.year > end) return false;
    }

    // Filtre par statut
    if (status) {
      if (status === 'pas-vu' && f.GozzaStatus !== 'pas-vu' && f.LoliaStatus !== 'pas-vu') return false;
      if (status === 'vu' && f.GozzaStatus !== 'vu' && f.LoliaStatus !== 'vu') return false;
      if (status === 'a-revoir' && f.GozzaStatus !== 'a-revoir' && f.LoliaStatus !== 'a-revoir') return false;
    }

    return true;
  });
}

function render(){
  const list=getFiltered();
  document.getElementById('results-count').textContent=list.length===films.length?`${films.length} films`:`${list.length} film${list.length!==1?'s':''} sur ${films.length}`;
  renderGrid(list);renderTable(list);buildGenreFilter();
}

  function renderGrid(list) {
  const grid = document.getElementById('grid-view');
  grid.innerHTML = '';

  list.forEach(film => {
    const card = document.createElement('div');
    card.className = 'film-card';
    card.dataset.filmId = film.id;
    card.dataset.id = film.id;

    // Contenu de l'affiche
    let posterContent = '';
    const ck = cacheKey(film);

    if (pC[ck]) {
      posterContent = `<img src="${pC[ck]}" alt="${film.title}" loading="lazy">
        <div class="poster-hint"><span><i class="fa fa-circle-play"></i> Voir les détails</span></div>`;
    } else if (pC[ck] === null) {
      posterContent = `<div class="poster-placeholder">
        <div class="ph-icon">🎬</div>
        <div class="ph-title">${film.title}</div>
        <div class="ph-year">${film.year}</div>
      </div>
      <div class="poster-hint"><span><i class="fa fa-circle-play"></i> Voir les détails</span></div>`;
    } else {
      posterContent = `<div class="poster-loading">
        <div class="spinner"></div>
      </div>`;
      enqueueFetch(film);
    }

    // Initiales pour les badges
    const gI = 'G', lI = 'L';

    // Contenu des boutons de statut
    const statusButtons = `
      <div class="card-ratings">
        <button class="csb-btn ${film.GozzaStatus}" onclick="toggleStatus(${film.id},'Gozza',event)" title="Gozza : ${SL[film.GozzaStatus]}">
          <span class="csb-who">${gI}</span>
          <span class="csb-label">${SL[film.GozzaStatus]}</span>
        </button>
        <button class="csb-btn ${film.LoliaStatus}" onclick="toggleStatus(${film.id},'Lolia',event)" title="Lolia : ${SL[film.LoliaStatus]}">
          <span class="csb-who">${lI}</span>
          <span class="csb-label">${SL[film.LoliaStatus]}</span>
        </button>
      </div>`;

    // Pied de carte avec titre et métadonnées
    const cardFoot = `
      <div class="card-foot" onclick="openDetail(${film.id})">
        <div class="cf-title">${film.title}</div>
        <div class="cf-meta">${film.year}<span class="cf-meta-dot"></span>${flags(film.country)}</div>
      </div>`;

    // Assemblage final (une seule fois, plus de bug de double innerHTML)
    card.innerHTML = `
      <div class="poster-wrap">
        ${posterContent}
      </div>
      ${statusButtons}
      ${cardFoot}
    `;

    // Ajout de l'événement de clic sur l'affiche
    card.querySelector('.poster-wrap').addEventListener('click', () => openDetail(film.id));

    grid.appendChild(card);
  });
}


function renderTable(list){
  const tbody=document.getElementById('film-list');tbody.innerHTML='';
  list.forEach(f=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td style="cursor:pointer;font-weight:600;" onclick="openDetail(${f.id})">${f.title}</td>
      <td>${flags(f.country)}</td><td>${f.year}</td>
      <td style="font-size:.8rem;color:#666;">${f.genre||''}</td>
      <td style="text-align:center"><button class="status-badge ${SC[f.GozzaStatus]}" onclick="toggleStatus(${f.id},'Gozza',event)">${SL[f.GozzaStatus]}</button></td>
      <td style="text-align:center"><span class="star-rating">${starsHTML(f.id,'Gozza',f.ratingGozza,'star')}</span></td>
      <td style="text-align:center"><button class="status-badge ${SC[f.LoliaStatus]}" onclick="toggleStatus(${f.id},'Lolia',event)">${SL[f.LoliaStatus]}</button></td>
      <td style="text-align:center"><span class="star-rating">${starsHTML(f.id,'Lolia',f.ratingLolia,'star')}</span></td>
      <td style="text-align:center"><button class="delete-btn" onclick="confirmDelete(${f.id})"><i class="fa fa-trash"></i></button></td>`;
    tbody.appendChild(tr);
  });
}
function render() {
  const list = getFiltered();
  console.log("Films rendus:", list.map(f => ({id: f.id, title: f.title})));
  document.getElementById('results-count').textContent = list.length === films.length
    ? `${films.length} films`
    : `${list.length} film${list.length !== 1 ? 's' : ''} sur ${films.length}`;

  renderGrid(list);
  renderTable(list);
  buildGenreFilter();
}
function buildGenreFilter(){
  const g=new Set();films.forEach(f=>{if(f.genre)f.genre.split('/').forEach(x=>g.add(x.trim()));});
  const sel=document.getElementById('filter-genre');const cur=sel.value;
  sel.innerHTML='<option value="">🎭 Tous les genres</option>';
  [...g].sort().forEach(x=>{const o=document.createElement('option');o.value=x;o.textContent=x;sel.appendChild(o);});
  sel.value=cur;
}

function updateStats(){
  document.getElementById('total-films').textContent=films.length;
  document.getElementById('watched-Gozza').textContent=films.filter(f=>f.GozzaStatus==='vu').length;
  document.getElementById('watched-Lolia').textContent=films.filter(f=>f.LoliaStatus==='vu').length;
  document.getElementById('rewatch-count').textContent=films.filter(f=>f.GozzaStatus==='a-revoir'||f.LoliaStatus==='a-revoir').length;
}

function setView(v){
  document.getElementById('grid-view').style.display=v==='grid'?'grid':'none';
  document.getElementById('table-view').style.display=v==='table'?'block':'none';
  document.getElementById('btn-grid').classList.toggle('active',v==='grid');
  document.getElementById('btn-table').classList.toggle('active',v==='table');
}

document.querySelectorAll('th.sortable').forEach(th=>{
  th.addEventListener('click',()=>{
    const k=th.dataset.sort;sortDir=(sortKey===k&&sortDir==='asc')?'desc':'asc';sortKey=k;
    document.querySelectorAll('th.sortable').forEach(t=>t.classList.remove('asc','desc'));
    th.classList.add(sortDir);render();
  });
});
['search','filter-country','filter-genre','filter-decade','filter-status'].forEach(id=>{
  const el=document.getElementById(id);el.addEventListener('input',render);el.addEventListener('change',render);
});
document.getElementById('reset-btn').addEventListener('click',()=>{
  document.getElementById('search').value='';
  ['filter-country','filter-genre','filter-decade','filter-status'].forEach(id=>document.getElementById(id).value='');
  render();
});
let sogPick = null;

function pickRandom() {
  const pool = films.filter(f => f.GozzaStatus === 'pas-vu' || f.LoliaStatus === 'pas-vu');
  return (pool.length ? pool : films)[Math.floor(Math.random() * (pool.length || films.length))];
}

function showSuggestion(pick) {
  sogPick = pick;
  const k = cacheKey(pick);
  // Poster
  const pw = document.getElementById('sog-poster');
  if (pC[k]) {
    pw.innerHTML = `<img src="${pC[k]}" alt="${pick.title}"><div class="sog-glow"></div>`;
  } else {
    pw.innerHTML = `<div class="sog-poster-ph">🎬</div><div class="sog-glow"></div>`;
    // Tente de charger l'affiche si pas encore en cache
    if (pC[k] === undefined) {
      enqueueFetch(pick);
      // Polling léger pour mettre à jour l'affiche dans l'overlay
      const interval = setInterval(() => {
        if (pC[k]) {
          pw.innerHTML = `<img src="${pC[k]}" alt="${pick.title}"><div class="sog-glow"></div>`;
          clearInterval(interval);
        }
      }, 400);
      setTimeout(() => clearInterval(interval), 8000);
    }
  }
  document.getElementById('sog-title').textContent = tC[k] || pick.title;
  document.getElementById('sog-meta').innerHTML = `<span>${pick.year}</span><span>·</span><span>${flags(pick.country)}</span>`;
  document.getElementById('sog-genre').textContent = pick.genre || '';
  document.getElementById('suggestion-overlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function sogOpen() {
  if (!sogPick) return;
  document.getElementById('suggestion-overlay').classList.remove('show');
  document.body.style.overflow = '';
  openDetail(sogPick.id);
}

function closeSog() {
  document.getElementById('suggestion-overlay').classList.remove('show');
  document.body.style.overflow = '';
}

document.getElementById('random-btn').addEventListener('click', () => showSuggestion(pickRandom()));
document.getElementById('sog-close').addEventListener('click', closeSog);
document.getElementById('sog-reroll').addEventListener('click', () => showSuggestion(pickRandom()));
document.getElementById('suggestion-overlay').addEventListener('click', e => { if (e.target === document.getElementById('suggestion-overlay')) closeSog(); });
document.getElementById('add-film-btn').addEventListener('click',()=>document.getElementById('add-modal').classList.add('show'));
['close-add','cancel-add'].forEach(id=>document.getElementById(id).addEventListener('click',()=>document.getElementById('add-modal').classList.remove('show')));
document.getElementById('confirm-add').addEventListener('click',()=>{
  const title=document.getElementById('new-title').value.trim();
  const year=parseInt(document.getElementById('new-year').value);
  const country=document.getElementById('new-country').value;
  const genre=document.getElementById('new-genre').value.trim();
  if(!title||!year){alert('Titre et année requis.');return;}
  const nf={id:nextId++,title,country,year,genre:genre||'Non défini',GozzaStatus:'pas-vu',LoliaStatus:'pas-vu',ratingGozza:0,ratingLolia:0};
  if(window.saveFilmToDb)window.saveFilmToDb(nf);
  document.getElementById('new-title').value='';document.getElementById('new-genre').value='';
  document.getElementById('add-modal').classList.remove('show');
});
function confirmDelete(id){filmToDelete=id;document.getElementById('del-modal').classList.add('show');}
document.getElementById('confirm-del').addEventListener('click',()=>{
  if(filmToDelete!==null){if(window.deleteFilmFromDb)window.deleteFilmFromDb(filmToDelete);films=films.filter(f=>f.id!==filmToDelete);filmToDelete=null;render();updateStats();}
  document.getElementById('del-modal').classList.remove('show');
});
document.getElementById('cancel-del').addEventListener('click',()=>{filmToDelete=null;document.getElementById('del-modal').classList.remove('show');});
function save(){films.forEach(f=>{if(window.saveFilmToDb)window.saveFilmToDb(f);});}
// Ajoutez ce code temporairement pour exporter les données
function exportData() {
  console.log(JSON.stringify(films, null, 2));
}
exportData();
render();updateStats();setView('grid');
</script>
