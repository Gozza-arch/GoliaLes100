<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100 Films Cultes — Lolia éduque Gozza</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&family=Crimson+Pro:ital,wght@0,400;1,400;1,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* ══════════════════════════════════════════════════
   TOKENS
══════════════════════════════════════════════════ */
:root {
  --ink:      #0a0a0f;
  --paper:    #f5f0e8;
  --cream:    #ede8dc;
  --gold:     #e8b84b;
  --gold2:    #c9922a;
  --red:      #d63031;
  --red2:     #b52525;
  --teal:     #00b5ad;
  --muted:    #8a8070;
  --card-bg:  #1a1a24;
  --card2:    #111118;
  --border:   rgba(232,184,75,0.25);
  --radius:   10px;
  --r-card:   12px;
  --shadow:   0 8px 32px rgba(0,0,0,0.45);
  --ff-head:  'Bebas Neue', sans-serif;
  --ff-body:  'DM Sans', sans-serif;
  --ff-serif: 'Crimson Pro', serif;
}

/* ══════════════════════════════════════════════════
   RESET & BASE
══════════════════════════════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: var(--ff-body);
  background: var(--ink);
  color: var(--paper);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Grain overlay */
body::before {
  content:'';
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  opacity: 0.35;
}

.container { max-width: 1440px; margin: 0 auto; padding: 0 28px 80px; position:relative; z-index:1; }

/* ══════════════════════════════════════════════════
   HEADER
══════════════════════════════════════════════════ */
.site-header {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 60px 0 50px;
  position: relative;
}

.header-filmstrip {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 24px;
  background: var(--ink);
  display: flex;
  align-items: center;
  overflow: hidden;
}

.filmstrip-holes {
  display: flex;
  gap: 0;
  width: 100%;
}

.filmstrip-holes::before,
.filmstrip-holes::after {
  content: '◉ ◉ ◉ ◉ ◉ ◉ ◉ ◉ ◉ ◉ ◉ ◉ ◉ ◉ ◉ ◉ ◉ ◉ ◉ ◉ ◉ ◉ ◉ ◉ ◉ ◉ ◉ ◉ ◉ ◉ ◉ ◉ ◉ ◉ ◉ ◉ ◉ ◉ ◉ ◉ ◉ ◉ ◉ ◉ ◉ ◉';
  color: rgba(232,184,75,0.4);
  font-size: 8px;
  letter-spacing: 6px;
  white-space: nowrap;
  flex: 1;
}

.header-eyebrow {
  font-family: var(--ff-body);
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 12px;
  margin-top: 16px;
}

.header-title {
  font-family: var(--ff-head);
  font-size: clamp(4rem, 10vw, 9rem);
  line-height: 0.9;
  letter-spacing: 2px;
  text-align: center;
  color: var(--paper);
  position: relative;
  -webkit-text-stroke: 1px rgba(232,184,75,0.3);
}

.header-title span {
  color: var(--gold);
  display: block;
  font-size: 0.55em;
  letter-spacing: 8px;
  -webkit-text-stroke: 0;
}

.header-sub {
  font-family: var(--ff-serif);
  font-style: italic;
  color: var(--muted);
  font-size: 1.1rem;
  margin-top: 14px;
  letter-spacing: 0.5px;
}

.header-divider {
  width: 120px;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 20px auto 0;
}

/* ══════════════════════════════════════════════════
   STATS
══════════════════════════════════════════════════ */
.stats {
  display: flex;
  gap: 12px;
  margin: 36px 0 28px;
  flex-wrap: wrap;
  justify-content: center;
}

.stat-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--r-card);
  padding: 18px 28px;
  text-align: center;
  flex: 1;
  min-width: 130px;
  max-width: 180px;
  transition: transform 0.2s, border-color 0.2s;
}

.stat-card:hover {
  transform: translateY(-3px);
  border-color: var(--gold);
}

.stat-number {
  display: block;
  font-family: var(--ff-head);
  font-size: 2.8rem;
  color: var(--gold);
  line-height: 1;
}

.stat-label {
  font-size: 0.72rem;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 4px;
  display: block;
}

/* ══════════════════════════════════════════════════
   TOOLBAR
══════════════════════════════════════════════════ */
.toolbar {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--r-card);
  padding: 18px 22px;
  margin-bottom: 20px;
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-items: center;
}

.search-wrap {
  position: relative;
  flex: 1;
  min-width: 240px;
}

.search-wrap i {
  position: absolute;
  left: 14px; top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  font-size: 0.9rem;
  pointer-events: none;
}

.search-wrap input {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  padding: 10px 14px 10px 38px;
  color: var(--paper);
  font-family: var(--ff-body);
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.2s;
}

.search-wrap input::placeholder { color: var(--muted); }
.search-wrap input:focus { border-color: var(--gold); }

.view-toggle {
  display: flex;
  gap: 4px;
  background: rgba(255,255,255,0.05);
  border-radius: 8px;
  padding: 4px;
}

.view-btn {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 0.85rem;
  transition: all 0.15s;
  display: flex; align-items: center; gap: 6px;
  font-family: var(--ff-body);
}

.view-btn.active { background: var(--gold); color: var(--ink); font-weight:700; }

.btn {
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  color: var(--ink);
  border: none;
  padding: 10px 20px;
  border-radius: 8px;
  cursor: pointer;
  font-family: var(--ff-body);
  font-weight: 700;
  font-size: 0.85rem;
  letter-spacing: 0.3px;
  transition: all 0.2s;
  white-space: nowrap;
  display: flex; align-items: center; gap: 7px;
}

.btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(232,184,75,0.35); }

.btn-ghost {
  background: rgba(255,255,255,0.07);
  color: var(--paper);
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: none;
}
.btn-ghost:hover { background: rgba(255,255,255,0.12); box-shadow: none; }

.btn-danger { background: linear-gradient(135deg, var(--red), var(--red2)); color: white; }

/* ══════════════════════════════════════════════════
   FILTERS
══════════════════════════════════════════════════ */
.filters-bar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 24px;
  align-items: center;
}

.filters-bar select {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--paper);
  font-family: var(--ff-body);
  font-size: 0.82rem;
  padding: 9px 12px;
  cursor: pointer;
  outline: none;
  transition: border-color 0.2s;
}

.filters-bar select:focus { border-color: var(--gold); }
.filters-bar select option { background: var(--card2); }

.filters-label {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--muted);
  margin-right: 4px;
}

/* ══════════════════════════════════════════════════
   SUGGESTION BANNER
══════════════════════════════════════════════════ */
.suggestion-banner {
  background: linear-gradient(135deg, rgba(232,184,75,0.12), rgba(232,184,75,0.05));
  border: 1px solid var(--gold);
  border-radius: var(--r-card);
  padding: 14px 20px;
  margin-bottom: 20px;
  display: none;
  align-items: center;
  gap: 12px;
}
.suggestion-banner.show { display: flex; }
.suggestion-banner .icon { font-size: 1.4rem; }
#suggestion-text { flex: 1; color: var(--gold); font-weight: 500; font-size: 0.95rem; }
.close-suggestion { background:none; border:none; color:var(--muted); cursor:pointer; font-size:1.3rem; line-height:1; }
.close-suggestion:hover { color: var(--red); }

/* ══════════════════════════════════════════════════
   RESULTS COUNT
══════════════════════════════════════════════════ */
.results-info {
  font-size: 0.78rem;
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 16px;
  padding-left: 2px;
}

/* ══════════════════════════════════════════════════
   GRID VIEW — AFFICHES
══════════════════════════════════════════════════ */
#grid-view {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
  gap: 20px;
}

.film-card {
  position: relative;
  border-radius: var(--r-card);
  overflow: visible;
  cursor: pointer;
  transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
}

.film-card:hover { transform: translateY(-6px) scale(1.03); z-index: 10; }

.poster-wrap {
  position: relative;
  border-radius: var(--r-card);
  overflow: hidden;
  aspect-ratio: 2/3;
  background: var(--card-bg);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
}

.poster-wrap img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: filter 0.3s;
}

.poster-placeholder {
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 14px;
  text-align: center;
  background: linear-gradient(160deg, #1e1e2e, #12121a);
}

.poster-placeholder .poster-icon {
  font-size: 2.5rem;
  opacity: 0.4;
}

.poster-placeholder .poster-title-ph {
  font-family: var(--ff-head);
  font-size: 0.85rem;
  letter-spacing: 1px;
  color: var(--paper);
  opacity: 0.7;
  line-height: 1.3;
}

.poster-placeholder .poster-year-ph {
  font-size: 0.72rem;
  color: var(--gold);
  opacity: 0.8;
}

/* OVERLAY au survol */
.poster-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.97) 0%, rgba(0,0,0,0.6) 45%, rgba(0,0,0,0) 70%);
  opacity: 0;
  transition: opacity 0.28s ease;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 14px 12px;
  border-radius: var(--r-card);
}

.film-card:hover .poster-overlay { opacity: 1; }
.film-card:hover .poster-wrap img { filter: brightness(0.7); }

.overlay-title {
  font-family: var(--ff-head);
  font-size: 1rem;
  letter-spacing: 0.5px;
  color: white;
  line-height: 1.2;
  margin-bottom: 4px;
}

.overlay-meta {
  font-size: 0.72rem;
  color: var(--gold);
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.overlay-synopsis {
  font-family: var(--ff-serif);
  font-style: italic;
  font-size: 0.8rem;
  color: rgba(255,255,255,0.8);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 4;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 10px;
}

.overlay-actions {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  margin-top: 4px;
}

/* Mini badges statuts */
.mini-badge {
  font-size: 0.62rem;
  font-weight: 700;
  letter-spacing: 0.5px;
  padding: 3px 8px;
  border-radius: 20px;
  border: none;
  cursor: pointer;
  text-transform: uppercase;
  transition: opacity 0.15s, transform 0.15s;
}
.mini-badge:hover { opacity: 0.85; transform: scale(1.05); }
.mini-badge.vu     { background: #22c55e; color: white; }
.mini-badge.pas-vu { background: var(--red); color: white; }
.mini-badge.a-revoir { background: #f59e0b; color: var(--ink); }

/* Star rating compact */
.mini-stars { display: flex; gap: 1px; }
.mini-stars .s {
  font-size: 0.85rem; cursor: pointer; color: #444;
  transition: color 0.1s, transform 0.1s;
}
.mini-stars .s.on { color: #f59e0b; }
.mini-stars .s:hover { transform: scale(1.3); }

/* Badge rating pill sur la carte */
.card-ratings {
  position: absolute;
  top: 8px; left: 8px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  z-index: 5;
}

.rating-pill {
  background: rgba(0,0,0,0.82);
  backdrop-filter: blur(4px);
  border-radius: 20px;
  padding: 2px 7px;
  font-size: 0.65rem;
  font-weight: 700;
  color: white;
  display: flex;
  align-items: center;
  gap: 3px;
  border: 1px solid rgba(255,255,255,0.1);
}

.rating-pill .rp-name { color: var(--muted); font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.5px; }
.rating-pill .rp-stars { color: #f59e0b; letter-spacing: -1px; }

/* Status corner */
.status-corners {
  position: absolute;
  top: 8px; right: 8px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  z-index: 5;
}

/* Card footer */
.card-footer {
  padding: 8px 4px 0;
}

.card-film-title {
  font-family: var(--ff-body);
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--paper);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.3;
}

.card-film-year {
  font-size: 0.68rem;
  color: var(--muted);
}

/* Delete button on card */
.card-delete {
  position: absolute;
  bottom: 8px; right: 8px;
  background: rgba(214,48,49,0.85);
  border: none;
  border-radius: 6px;
  color: white;
  width: 26px; height: 26px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.7rem;
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.2s;
  z-index: 6;
}
.film-card:hover .card-delete { opacity: 1; }

/* ══════════════════════════════════════════════════
   TABLE VIEW
══════════════════════════════════════════════════ */
#table-view { display: none; }

.table-wrap {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--r-card);
  overflow-x: auto;
}

table { width: 100%; border-collapse: collapse; min-width: 900px; }

th, td { padding: 12px 14px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }

th {
  background: rgba(0,0,0,0.4);
  color: var(--muted);
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  white-space: nowrap;
  user-select: none;
}

th.sortable { cursor: pointer; }
th.sortable:hover { color: var(--gold); }
th.sortable.asc::after  { content: ' ↑'; color: var(--gold); }
th.sortable.desc::after { content: ' ↓'; color: var(--gold); }

tbody tr:hover { background: rgba(255,255,255,0.03); }
tbody tr:last-child td { border-bottom: none; }

.country-flag { font-size: 1rem; }

.status-badge {
  display: inline-block;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  cursor: pointer;
  border: none;
  transition: opacity 0.15s, transform 0.15s;
}
.status-badge:hover { opacity: 0.8; transform: scale(1.05); }
.status-badge.watched     { background: #22c55e; color: white; }
.status-badge.not-watched { background: var(--red); color: white; }
.status-badge.rewatch     { background: #f59e0b; color: var(--ink); }

.star-rating { display: inline-flex; gap: 2px; }
.star-rating .star {
  font-size: 1rem; cursor: pointer; color: #333;
  transition: color 0.1s, transform 0.1s;
}
.star-rating .star.on { color: #f59e0b; }
.star-rating .star:hover { transform: scale(1.3); }

.delete-btn {
  background: none; border: none; cursor: pointer;
  color: #444; font-size: 0.9rem;
  width: 30px; height: 30px;
  border-radius: 6px;
  display: inline-flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.delete-btn:hover { background: var(--red); color: white; }

/* ══════════════════════════════════════════════════
   MODAL
══════════════════════════════════════════════════ */
.modal {
  display: none;
  position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(6px);
  align-items: center; justify-content: center;
}
.modal.show { display: flex; }

.modal-box {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px;
  width: 90%; max-width: 460px;
  position: relative;
  animation: popIn 0.2s cubic-bezier(.34,1.56,.64,1);
  box-shadow: 0 30px 80px rgba(0,0,0,0.7);
}

@keyframes popIn {
  from { opacity:0; transform:scale(0.9) translateY(12px); }
  to   { opacity:1; transform:scale(1) translateY(0); }
}

.modal-title {
  font-family: var(--ff-head);
  font-size: 1.8rem;
  letter-spacing: 1px;
  color: var(--paper);
  margin-bottom: 22px;
}

.close-modal {
  position: absolute; right: 16px; top: 14px;
  background: none; border: none;
  color: var(--muted); font-size: 1.4rem;
  cursor: pointer; line-height: 1;
  transition: color 0.15s, transform 0.15s;
}
.close-modal:hover { color: var(--red); transform: rotate(90deg); }

.form-group { margin-bottom: 16px; }
.form-group label {
  display: block; margin-bottom: 6px;
  font-size: 0.78rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1px;
  color: var(--muted);
}
.form-group input,
.form-group select {
  width: 100%;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px;
  padding: 10px 14px;
  color: var(--paper);
  font-family: var(--ff-body);
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.2s;
}
.form-group input:focus,
.form-group select:focus { border-color: var(--gold); }
.form-group select option { background: var(--card2); }

.modal-buttons { display: flex; justify-content: flex-end; gap: 8px; margin-top: 24px; }

/* ══════════════════════════════════════════════════
   LOADING SPINNER
══════════════════════════════════════════════════ */
.poster-loading {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: var(--card-bg);
}
.spinner {
  width: 24px; height: 24px;
  border: 2px solid rgba(232,184,75,0.2);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ══════════════════════════════════════════════════
   MOBILE
══════════════════════════════════════════════════ */
@media (max-width: 600px) {
  #grid-view { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
  .header-title { font-size: 3.5rem; }
  .toolbar { gap: 8px; }
}
</style>
</head>
<body>
<div class="container">

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-filmstrip"><div class="filmstrip-holes"></div></div>
    <p class="header-eyebrow">✦ Collection Personnelle ✦</p>
    <h1 class="header-title">
      100 Films<br>
      <span>Cultes</span>
    </h1>
    <p class="header-sub">Lolia éduque Gozza, un chef-d'œuvre à la fois</p>
    <div class="header-divider"></div>
  </header>

  <!-- STATS -->
  <div class="stats">
    <div class="stat-card">
      <span class="stat-number" id="total-films">0</span>
      <span class="stat-label">Films</span>

/* ══════════════════════════════════════════════════
   TMDB — AFFICHES + SYNOPSIS
   Clé publique lecture seule (v3 read access token)
══════════════════════════════════════════════════ */
const TMDB_KEY = '2dca580c2a14b55200e784d157207b4d'; // clé demo publique
const TMDB_IMG = 'https://image.tmdb.org/t/p/w342';
const posterCache   = {};  // filmId → url|null
const synopsisCache = {};  // filmId → string

async function fetchTMDB(film) {
  if (posterCache[film.id] !== undefined) return;
  posterCache[film.id]   = null;
  synopsisCache[film.id] = '';
  try {
    const q = encodeURIComponent(film.title);
    const url = `https://api.themoviedb.org/3/search/movie?api_key=${TMDB_KEY}&query=${q}&year=${film.year}&language=fr-FR`;
    const res = await fetch(url);
    const data = await res.json();
    const hit = (data.results||[]).find(r => r.poster_path);
    if (hit) {
      posterCache[film.id]   = TMDB_IMG + hit.poster_path;
      synopsisCache[film.id] = hit.overview || '';
    }
    // Re-render only the card that got data
    updateCard(film.id);
  } catch(e) {}
}

let sortKey = null, sortDir = 'asc', filmToDelete = null;
let nextId = Math.max(...films.map(f=>f.id)) + 1;
let currentView = 'grid';

/* ── FLAGS ── */
const FLAGS = { us:'🇺🇸', fr:'🇫🇷', jp:'🇯🇵', gb:'🇬🇧', kr:'🇰🇷', ru:'🇷🇺', se:'🇸🇪', it:'🇮🇹', de:'🇩🇪', au:'🇦🇺', br:'🇧🇷' };
function formatFlags(country) {
  return country.split('-').map(c => FLAGS[c]||c.toUpperCase()).join(' ');
}

/* ── STATUS ── */
const STATUS_LABEL = { 'vu':'Vu ✓', 'a-revoir':'À revoir', 'pas-vu':'Pas vu' };
const STATUS_CLASS = { 'vu':'watched', 'a-revoir':'rewatch', 'pas-vu':'not-watched' };
const STATUS_MINI  = { 'vu':'vu', 'a-revoir':'a-revoir', 'pas-vu':'pas-vu' };

function toggleStatus(filmId, person, e) {
  if(e) e.stopPropagation();
  const film = films.find(f=>f.id===filmId); if(!film) return;
  const key = person==='Gozza' ? 'GozzaStatus' : 'LoliaStatus';
  const rk  = person==='Gozza' ? 'ratingGozza' : 'ratingLolia';
  if (film[key]==='pas-vu') { film[key]='vu'; if(!film[rk]) film[rk]=1; }
  else if (film[key]==='vu') { film[key]='a-revoir'; }
  else { film[key]='pas-vu'; film[rk]=0; }
  save(); render(); updateStats();
}

/* ── STARS ── */
function setRating(filmId, person, rating, e) {
  if(e) e.stopPropagation();
  const film = films.find(f=>f.id===filmId); if(!film) return;
  const key = person==='Gozza' ? 'ratingGozza' : 'ratingLolia';
  film[key] = (film[key]===rating) ? 0 : rating;
  save(); render();
}

function renderStars(filmId, person, rating) {
  return [1,2,3,4,5].map(i => {
    const on = i <= rating ? 'on' : '';
    return `<span class="star ${on}"
      onclick="setRating(${filmId},'${person}',${i},event)"
      onmouseover="previewStars(this,${i})"
      onmouseout="resetStars(this,${rating})">★</span>`;
  }).join('');
}
function previewStars(el, n) {
  el.parentElement.querySelectorAll('.star').forEach((s,i) => s.style.color = i<n ? '#f59e0b' : '#333');
}
function resetStars(el, r) {
  el.parentElement.querySelectorAll('.star').forEach((s,i) => s.style.color = i<r ? '#f59e0b' : '#333');
}

function renderMiniStars(filmId, person, rating) {
  return [1,2,3,4,5].map(i => {
    const on = i <= rating ? 'on' : '';
    return `<span class="s ${on}"
      onclick="setRating(${filmId},'${person}',${i},event)"
      onmouseover="previewMiniStars(this,${i})"
      onmouseout="resetMiniStars(this,${rating})">★</span>`;
  }).join('');
}
function previewMiniStars(el, n) {
  el.parentElement.querySelectorAll('.s').forEach((s,i) => s.style.color = i<n ? '#f59e0b' : '#555');
}
function resetMiniStars(el, r) {
  el.parentElement.querySelectorAll('.s').forEach((s,i) => s.style.color = i<r ? '#f59e0b' : '#555');
}

/* ── CARD UPDATE (poster loaded) ── */
function updateCard(filmId) {
  const el = document.querySelector(`[data-film-id="${filmId}"]`);
  if (!el) return;
  const wrap = el.querySelector('.poster-wrap');
  if (!wrap) return;
  if (posterCache[filmId]) {
    wrap.innerHTML = `<img src="${posterCache[filmId]}" alt="Affiche" loading="lazy">
      <div class="poster-overlay">${buildOverlay(films.find(f=>f.id===filmId))}</div>`;
  }
}

function buildOverlay(film) {
  const synopsis = synopsisCache[film.id] || '<em>Aucun résumé disponible.</em>';
  return `
    <div class="overlay-title">${film.title}</div>
    <div class="overlay-meta">${film.year} · ${film.genre||''}</div>
    <div class="overlay-synopsis">${synopsis}</div>
    <div class="overlay-actions">
      <div>
        <div style="font-size:0.6rem;color:#aaa;margin-bottom:2px;letter-spacing:1px;">GOZZA</div>
        <button class="mini-badge ${STATUS_MINI[film.GozzaStatus]}" onclick="toggleStatus(${film.id},'Gozza',event)">${STATUS_LABEL[film.GozzaStatus]}</button>
        <div class="mini-stars" style="margin-top:4px;">${renderMiniStars(film.id,'Gozza',film.ratingGozza)}</div>
      </div>
      <div style="margin-left:10px;">
        <div style="font-size:0.6rem;color:#aaa;margin-bottom:2px;letter-spacing:1px;">LOLIA</div>
        <button class="mini-badge ${STATUS_MINI[film.LoliaStatus]}" onclick="toggleStatus(${film.id},'Lolia',event)">${STATUS_LABEL[film.LoliaStatus]}</button>
        <div class="mini-stars" style="margin-top:4px;">${renderMiniStars(film.id,'Lolia',film.ratingLolia)}</div>
      </div>
    </div>
  `;
}

/* ══════════════════════════════════════════════════
   VIEW TOGGLE
══════════════════════════════════════════════════ */
function setView(v) {
  currentView = v;
  document.getElementById('grid-view').style.display  = v==='grid'  ? 'grid'  : 'none';
  document.getElementById('table-view').style.display = v==='table' ? 'block' : 'none';
  document.getElementById('btn-grid').classList.toggle('active', v==='grid');
  document.getElementById('btn-table').classList.toggle('active', v==='table');
}

/* ══════════════════════════════════════════════════
   GENRE FILTER
══════════════════════════════════════════════════ */
function buildGenreFilter() {
  const genres = new Set();
  films.forEach(f => { if(f.genre) f.genre.split('/').forEach(g=>genres.add(g.trim())); });
  const sel = document.getElementById('filter-genre');
  const cur = sel.value;
  sel.innerHTML = '<option value="">🎭 Tous les genres</option>';
  [...genres].sort().forEach(g => { const o=document.createElement('option'); o.value=g; o.textContent=g; sel.appendChild(o); });
  sel.value = cur;
}

/* ══════════════════════════════════════════════════
   FILTERED LIST
══════════════════════════════════════════════════ */
function getFiltered() {
  const search = document.getElementById('search').value.toLowerCase();
  const fc = document.getElementById('filter-country').value;
  const fg = document.getElementById('filter-genre').value;
  const fd = document.getElementById('filter-decade').value;
  const fs = document.getElementById('filter-status').value;

  let list = films.filter(f => {
    if (search && !f.title.toLowerCase().includes(search) && !(f.genre||'').toLowerCase().includes(search)) return false;
    if (fc && !f.country.split('-').includes(fc)) return false;
    if (fg && !(f.genre||'').split('/').map(g=>g.trim()).includes(fg)) return false;
    if (fd) { const d=parseInt(fd); if(f.year<d||f.year>=d+10) return false; }
    if (fs && f.GozzaStatus!==fs && f.LoliaStatus!==fs) return false;
    return true;
  });

  if (sortKey) {
    list.sort((a,b) => {
      let va=a[sortKey], vb=b[sortKey];
      if(typeof va==='string'){va=va.toLowerCase();vb=vb.toLowerCase();}
      return sortDir==='asc'?(va<vb?-1:va>vb?1:0):(va>vb?-1:va<vb?1:0);
    });
  }
  return list;
}

/* ══════════════════════════════════════════════════
   RENDER
══════════════════════════════════════════════════ */
function render() {
  const list = getFiltered();
  document.getElementById('results-count').textContent =
    list.length===films.length ? `${films.length} films` :
    `${list.length} film${list.length!==1?'s':''} sur ${films.length}`;

  renderGrid(list);
  renderTable(list);
  buildGenreFilter();
}

function renderGrid(list) {
  const grid = document.getElementById('grid-view');
  grid.innerHTML = '';
  list.forEach(film => {
    const hasPoster = posterCache[film.id];
    const hasImg = hasPoster && hasPoster !== null;

    const card = document.createElement('div');
    card.className = 'film-card';
    card.dataset.filmId = film.id;

    let posterContent = '';
    if (hasImg) {
      posterContent = `<img src="${hasPoster}" alt="Affiche" loading="lazy">
        <div class="poster-overlay">${buildOverlay(film)}</div>`;
    } else if (posterCache[film.id] === null) {
      // Tried, no result
      posterContent = `<div class="poster-placeholder">
        <div class="poster-icon">🎬</div>
        <div class="poster-title-ph">${film.title}</div>
        <div class="poster-year-ph">${film.year}</div>
        <div class="poster-overlay" style="opacity:0;border-radius:var(--r-card);">${buildOverlay(film)}</div>
      </div>`;
    } else {
      // Not yet fetched
      posterContent = `<div class="poster-loading"><div class="spinner"></div></div>`;
      fetchTMDB(film);
    }

    // Rating pills
    const gRating = film.ratingGozza>0 ? '★'.repeat(film.ratingGozza) : '—';
    const lRating = film.ratingLolia>0 ? '★'.repeat(film.ratingLolia) : '—';

    card.innerHTML = `
      <div class="poster-wrap">${posterContent}</div>
      <div class="card-ratings">
        <div class="rating-pill"><span class="rp-name">G</span> <span class="rp-stars">${gRating}</span></div>
        <div class="rating-pill"><span class="rp-name">L</span> <span class="rp-stars">${lRating}</span></div>
      </div>
      <div class="status-corners">
        <div class="rating-pill" style="background:rgba(0,0,0,0.8);font-size:0.6rem;">
          ${film.GozzaStatus==='vu'?'✅':film.GozzaStatus==='a-revoir'?'🔄':'⬜'}
          ${film.LoliaStatus==='vu'?'✅':film.LoliaStatus==='a-revoir'?'🔄':'⬜'}
        </div>
      </div>
      <button class="card-delete" onclick="confirmDelete(${film.id});event.stopPropagation()"><i class="fa fa-trash"></i></button>
      <div class="card-footer">
        <div class="card-film-title">${film.title}</div>
        <div class="card-film-year">${film.year} · ${formatFlags(film.country)}</div>
      </div>
    `;

    // Fix overlay opacity for placeholder
    if (!hasImg && posterCache[film.id] === null) {
      const pw = card.querySelector('.poster-wrap');
      if (pw) {
        pw.addEventListener('mouseenter', () => { const ov = pw.querySelector('.poster-overlay'); if(ov) ov.style.opacity='1'; });
        pw.addEventListener('mouseleave', () => { const ov = pw.querySelector('.poster-overlay'); if(ov) ov.style.opacity='0'; });
      }
    }

    grid.appendChild(card);
  });
}

function renderTable(list) {
  const tbody = document.getElementById('film-list');
  tbody.innerHTML = '';
  list.forEach(film => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><strong>${film.title}</strong></td>
      <td>${formatFlags(film.country)}</td>
      <td>${film.year}</td>
      <td style="font-size:0.82rem;color:#888;">${film.genre||''}</td>
      <td style="text-align:center">
        <button class="status-badge ${STATUS_CLASS[film.GozzaStatus]}" onclick="toggleStatus(${film.id},'Gozza',event)">
          ${STATUS_LABEL[film.GozzaStatus]}
        </button>
      </td>
      <td style="text-align:center">
        <span class="star-rating">${renderStars(film.id,'Gozza',film.ratingGozza)}</span>
      </td>
      <td style="text-align:center">
        <button class="status-badge ${STATUS_CLASS[film.LoliaStatus]}" onclick="toggleStatus(${film.id},'Lolia',event)">
          ${STATUS_LABEL[film.LoliaStatus]}
        </button>
      </td>
      <td style="text-align:center">
        <span class="star-rating">${renderStars(film.id,'Lolia',film.ratingLolia)}</span>
      </td>
      <td style="text-align:center">
        <button class="delete-btn" onclick="confirmDelete(${film.id})"><i class="fa fa-trash"></i></button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

/* ══════════════════════════════════════════════════
   STATS
══════════════════════════════════════════════════ */
function updateStats() {
  document.getElementById('total-films').textContent    = films.length;
  document.getElementById('watched-Gozza').textContent  = films.filter(f=>f.GozzaStatus==='vu').length;
  document.getElementById('watched-Lolia').textContent  = films.filter(f=>f.LoliaStatus==='vu').length;
  document.getElementById('rewatch-count').textContent  = films.filter(f=>f.GozzaStatus==='a-revoir'||f.LoliaStatus==='a-revoir').length;
}

/* ══════════════════════════════════════════════════
   SORT
══════════════════════════════════════════════════ */
document.querySelectorAll('th.sortable').forEach(th => {
  th.addEventListener('click', () => {
    const key = th.dataset.sort;
    sortDir = (sortKey===key&&sortDir==='asc')?'desc':'asc';
    sortKey = key;
    document.querySelectorAll('th.sortable').forEach(t=>t.classList.remove('asc','desc'));
    th.classList.add(sortDir);
    render();
  });
});

/* ══════════════════════════════════════════════════
   FILTERS
══════════════════════════════════════════════════ */
['search','filter-country','filter-genre','filter-decade','filter-status']
  .forEach(id => {
    const el = document.getElementById(id);
    el.addEventListener('input', render);
    el.addEventListener('change', render);
  });

document.getElementById('reset-filters-btn').addEventListener('click', () => {
  document.getElementById('search').value = '';
  ['filter-country','filter-genre','filter-decade','filter-status'].forEach(id => document.getElementById(id).value='');
  render();
});

/* ══════════════════════════════════════════════════
   RANDOM FILM
══════════════════════════════════════════════════ */
document.getElementById('random-film-btn').addEventListener('click', () => {
  const pool = films.filter(f=>f.GozzaStatus==='pas-vu'||f.LoliaStatus==='pas-vu');
  const pick = (pool.length?pool:films)[Math.floor(Math.random()*(pool.length||films.length))];
  document.getElementById('suggestion-text').textContent =
    `Film suggéré : ${pick.title} (${pick.year})${pick.genre?' — '+pick.genre:''}`;
  document.getElementById('random-film-suggestion').classList.add('show');
});
document.getElementById('close-suggestion').addEventListener('click', () =>
  document.getElementById('random-film-suggestion').classList.remove('show'));

/* ══════════════════════════════════════════════════
   ADD FILM
══════════════════════════════════════════════════ */
document.getElementById('add-film-btn').addEventListener('click', () =>
  document.getElementById('add-film-modal').classList.add('show'));
['close-add-modal','cancel-add'].forEach(id =>
  document.getElementById(id).addEventListener('click', () =>
    document.getElementById('add-film-modal').classList.remove('show')));

document.getElementById('confirm-add').addEventListener('click', () => {
  const title   = document.getElementById('new-film-title').value.trim();
  const country = document.getElementById('new-film-country').value;
  const year    = parseInt(document.getElementById('new-film-year').value);
  const genre   = document.getElementById('new-film-genre').value.trim();
  if (!title||!year) { alert('Titre et année sont requis.'); return; }
  const newFilm = { id:nextId++, title, country, year, genre:genre||'Non défini',
    GozzaStatus:'pas-vu', LoliaStatus:'pas-vu', ratingGozza:0, ratingLolia:0 };
  if (window.saveFilmToDb) window.saveFilmToDb(newFilm);
  document.getElementById('new-film-title').value='';
  document.getElementById('new-film-genre').value='';
  document.getElementById('add-film-modal').classList.remove('show');
});

/* ══════════════════════════════════════════════════
   DELETE
══════════════════════════════════════════════════ */
function confirmDelete(id) {
  filmToDelete = id;
  document.getElementById('confirm-modal').classList.add('show');
}
document.getElementById('confirm-delete').addEventListener('click', () => {
  if (filmToDelete!==null) {
    if (window.deleteFilmFromDb) window.deleteFilmFromDb(filmToDelete);
    films = films.filter(f=>f.id!==filmToDelete);
    filmToDelete=null; render(); updateStats();
  }
  document.getElementById('confirm-modal').classList.remove('show');
});
document.getElementById('cancel-delete').addEventListener('click', () => {
  filmToDelete=null;
  document.getElementById('confirm-modal').classList.remove('show');
});

/* ══════════════════════════════════════════════════
   SAVE
══════════════════════════════════════════════════ */
function save() {
  films.forEach(film => { if(window.saveFilmToDb) window.saveFilmToDb(film); });
}

/* ══════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════ */
render(); updateStats();
setView('grid');
</script>
